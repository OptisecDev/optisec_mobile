name: optisec_mobile
description: OptiSec Mobile - Advanced Security & Privacy Suite
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management & navigation
  get: ^4.6.6

  # Network & WiFi
  wifi_scan: ^0.4.1
  network_info_plus: ^5.0.3

  # Permissions
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.68.0

  # Fonts & animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utilities
  intl: ^0.20.2
  get_storage: ^2.1.1

  # Networking
  http: ^1.2.0

  # Subscriptions / IAP
  in_app_purchase: ^3.2.3
  # Already resolved transitively by in_app_purchase's Android platform impl;
  # promoted to a direct dependency because purchase_service.dart now
  # imports GooglePlayPurchaseDetails directly for local signature
  # verification (see Issue 2 remediation).
  in_app_purchase_android: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
